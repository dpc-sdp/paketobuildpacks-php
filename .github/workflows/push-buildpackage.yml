name: Push Buildpackage

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'Buildpack version to publish (semver, with or without leading v)'
        required: true
        type: string
      ecr-push-role-arn:
        description: 'Role ARN to assume for pushing to ECR'
        required: false
        type: string
      aws-region:
        description: 'AWS region to push to'
        required: false
        type: string
        default: ap-southeast-4

env:
  REGISTRIES_FILENAME: "registries.json"
  AWS_REGION: "ap-southeast-4"

jobs:
  push:
    name: Push
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse Event
        id: event
        run: |
          # Resolve version source by trigger type.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FULL_VERSION="${{ inputs.version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            FULL_VERSION="$(jq -r '.release.tag_name // empty' "${GITHUB_EVENT_PATH}")"
          else
            echo "Unsupported event type: ${{ github.event_name }}"
            exit 1
          fi

          # Normalize optional leading v.
          FULL_VERSION="${FULL_VERSION#v}"

          # Strict validation: require x.y.z semver with optional pre-release/build metadata.
          if [[ -z "${FULL_VERSION}" ]]; then
            echo "Version is required but was empty"
            exit 1
          fi
          if ! [[ "${FULL_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\-+][0-9A-Za-z\.-]+)?$ ]]; then
            echo "Invalid version '${FULL_VERSION}'. Expected semver like 1.2.3 (optionally with pre-release/build metadata)."
            exit 1
          fi

          MINOR_VERSION="$(echo "${FULL_VERSION}" | awk -F '.' '{print $1 "." $2 }')"
          MAJOR_VERSION="$(echo "${FULL_VERSION}" | awk -F '.' '{print $1 }')"

          echo "tag_full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_minor=${MINOR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_major=${MAJOR_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package buildpack
        run: |
          ./scripts/package.sh --version "${{ steps.event.outputs.tag_full }}" --output build/buildpackage.cnb

      - name: Parse Configs
        id: parse_configs
        run: |
          registries_filename="${{ env.REGISTRIES_FILENAME }}"

          push_to_ecr=true

          if [[ -f $registries_filename ]]; then
            if jq 'has("ecr")' $registries_filename > /dev/null; then
              push_to_ecr=$(jq '.ecr' $registries_filename)
            fi
          fi

          echo "push_to_ecr=${push_to_ecr}" >> "$GITHUB_OUTPUT"

      - name: Install yj and crane
        uses: buildpacks/github-actions/setup-tools@v5.12.1

      - name: Validate version
        run: |
          buidpackTomlVersion=$(tar -xzf build/buildpack-release-artifact.tgz --to-stdout buildpack.toml | yj -tj | jq -r .buildpack.version)
          githubReleaseVersion="${{ steps.event.outputs.tag_full }}"
          if [[ "$buidpackTomlVersion" != "$githubReleaseVersion" ]]; then
            echo "Version in buildpack.toml ($buidpackTomlVersion) and resolved workflow version ($githubReleaseVersion) are not identical"
            exit 1
          fi

      - name: Configure AWS credentials
        if: ${{ steps.parse_configs.outputs.push_to_ecr == 'true' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.ecr-push-role-arn || secrets.ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        if: ${{ steps.parse_configs.outputs.push_to_ecr == 'true' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        if: ${{ steps.parse_configs.outputs.push_to_ecr == 'true' }}
        id: push
        run: |
          ./scripts/publish.sh \
            --archive-path build/buildpack-release-artifact.tgz \
            --image-ref "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_full }}"

          pushed_image_index_digest=$(crane digest "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_full }}" | xargs)

          crane copy "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_full }}" "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_minor }}"
          crane copy "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_full }}" "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_major }}"
          crane copy "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:${{ steps.event.outputs.tag_full }}" "${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}:latest"

          echo "image=${{ steps.login-ecr.outputs.registry }}/marina-platform/buildpacks/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          echo "digest=$pushed_image_index_digest" >> "$GITHUB_OUTPUT"

  failure:
    name: Alert on Failure
    runs-on: ubuntu-24.04
    needs: [push]
    if: ${{ always() && needs.push.result == 'failure' }}
    steps:
      - name: File Failure Alert Issue
        uses: paketo-buildpacks/github-config/actions/issue/file@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          label: "failure:push"
          comment_if_exists: true
          issue_title: "Failure: Push Buildpackage workflow"
          issue_body: |
            Push Buildpackage workflow [failed](https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}).
          comment_body: |
            Another failure occurred: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}